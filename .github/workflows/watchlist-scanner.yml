name: Watchlist Scanner

on:
  schedule:
    # Hourly at :05 on weekdays (UTC). Markets that are closed produce no-op refreshes.
    - cron: '5 * * * 1-5'
  workflow_dispatch: {}

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run watchlist scanner
        run: npx tsx scripts/pipelines/run-watchlist-scanner.ts
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}

      - name: Revalidate page cache
        if: success()
        run: |
          curl -X POST "https://hq.claudiusinc.com/api/scanner/revalidate" \
            -H "Authorization: Bearer ${{ secrets.HQ_API_KEY }}" \
            -H "Content-Type: application/json" \
            --fail --silent --show-error || echo "Revalidation failed (non-critical)"

      - name: Summary
        if: always()
        run: |
          echo "## Watchlist Scanner" >> $GITHUB_STEP_SUMMARY
          echo "- Run time: $(date -u)" >> $GITHUB_STEP_SUMMARY

      - name: Notify on failure
        if: failure() && env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_ADMIN_CHAT_ID != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_ADMIN_CHAT_ID}" \
            -d "text=⚠️ Watchlist scanner failed: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
