name: Stock Scanner

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      markets:
        description: 'Markets to scan (comma-separated: US,SGX,HK)'
        required: false
        default: 'US,SGX,HK'

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run scanner
        run: npx tsx scripts/run-scanner.ts
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          SCAN_MARKETS: ${{ github.event.inputs.markets || 'US,SGX,HK' }}

      - name: Summary
        if: always()
        run: |
          echo "## Scanner Results" >> $GITHUB_STEP_SUMMARY
          echo "- Run time: $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "- Markets: ${{ github.event.inputs.markets || 'US,SGX,HK' }}" >> $GITHUB_STEP_SUMMARY
