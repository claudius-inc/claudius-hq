name: Momentum Snapshot

on:
  schedule:
    # Daily at 00:00 UTC = 08:00 SGT. Captures the day's momentum snapshot
    # after the morning watchlist scanner passes.
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Snapshot mode'
        type: choice
        default: 'auto'
        options:
          - auto
          - force

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Take momentum snapshot
        run: npx tsx scripts/pipelines/run-momentum-snapshot.ts
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}

      - name: Summary
        if: always()
        run: |
          echo "## Momentum Snapshot" >> $GITHUB_STEP_SUMMARY
          echo "- Run time: $(date -u)" >> $GITHUB_STEP_SUMMARY

      - name: Notify on failure
        if: failure() && env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_ADMIN_CHAT_ID != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_ADMIN_CHAT_ID}" \
            -d "text=⚠️ Momentum snapshot failed: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
